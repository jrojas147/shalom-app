<div class="login-page">
  <div class="login-card">
    <div class="login-brand">
      <span class="brand-logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M7 19H4.815a1.83 1.83 0 0 1-1.57-.881 1.785 1.785 0 0 1-.004-1.784L7.196 9.5" />
          <path d="M11 19h8.203a1.83 1.83 0 0 0 1.556-.89 1.784 1.784 0 0 0 0-1.775l-1.226-2.12" />
          <path d="m14 16-3 3 3 3" />
          <path d="M8.293 13.596 7.196 9.5 3.1 10.598" />
          <path d="m9.344 5.811 1.093-1.892A1.83 1.83 0 0 1 11.985 3a1.784 1.784 0 0 1 1.546.888l3.943 6.843" />
          <path d="m13.378 9.633 4.096 1.098 1.097-4.096" />
        </svg>
      </span>
      <h1>Shalom App</h1>
      <p>Control de operaciones</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="rp-field">
        <label for="username">Usuario</label>
        <input id="username" type="text" formControlName="username" placeholder="Ingrese su usuario" />
      </div>

      <div class="rp-field">
        <label for="password">Contraseña</label>
        <input id="password" type="password" formControlName="password" placeholder="Ingrese su contraseña" />
      </div>

      @if (error()) {
        <div class="rp-alert" [class.rp-alert--warning]="sessionConflict()" [class.rp-alert--error]="!sessionConflict()">
          {{ error() }}
          @if (sessionConflict()) {
            <button type="button" class="btn-link" (click)="submit(true)">
              Cerrar sesión anterior e ingresar
            </button>
          }
        </div>
      }

      <button type="submit" class="rp-btn rp-btn--primary login-submit" [disabled]="loading()">
        {{ loading() ? 'Ingresando...' : 'Iniciar sesión' }}
      </button>
    </form>
  </div>
</div>
